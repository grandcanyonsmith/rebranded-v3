<!-- 1 ▸ Scoped CSS (namespaced to cc360-hero-*) -->
<style>

/* ───────── Dark-mode adjustments ───────── */
@media (prefers-color-scheme: dark) {

  #cc360-hero-reviews h2,
  .cc360-hero-title,
  .cc360-hero-name {
    color: #f9fafc !important;
  }
  .cc360-hero-desc,
  .cc360-hero-text,
  .cc360-hero-date,
  .cc360-hero-meta {
    color: #d1d5db !important;
  }
  .cc360-hero-input {
    background: #1f2227;
    color: #f9fafc;
    border-color: #374151;
  }
  .cc360-hero-input::placeholder {
    color: #6b7280;
  }
  .cc360-hero-btn:hover {
    background: #c42800;
  }
  .cc360-hero-card,
  .cc360-hero-stack .cc360-hero-card {

    box-shadow: 0 3px 12px rgb(0 0 0 / .55);
  }

    color: #f9fafc;
  }
}
@media (prefers-color-scheme: dark) {
  :root {
    --cc360-hero-gray: #9ca3af;
    background: #0f1114;
    color: #e5e7eb;
  }
}

/* ─── Base Reset & Variables ─── */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
#cc360-hero-widget {
  font-family: var(--cc360-hero-font-sans);
  line-height: 1.45;

}

/* ─── Optional Nebula Backdrop ─── */
.cc360-hero-nebula-bg {
  --space: #f9fafc;
  --glow: 0, 140, 255;
  --power: .15;
  --vignette: rgba(255, 255, 255, .55);
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 50%, transparent 55%, var(--vignette) 100%),
    radial-gradient(650px 320px at 8% 15%, rgba(var(--glow), calc(var(--power) * .80)) 0%, transparent 70%),
    radial-gradient(550px 270px at 8% 51%, rgba(var(--glow), calc(var(--power) * .68)) 0%, transparent 72%),
    radial-gradient(480px 240px at 8% 87%, rgba(var(--glow), calc(var(--power) * .60)) 0%, transparent 74%),
    radial-gradient(380px 200px at 92% 25%, rgba(var(--glow), calc(var(--power) * .82)) 0%, transparent 70%),
    radial-gradient(340px 180px at 84% 56%, rgba(var(--glow), calc(var(--power) * .70)) 0%, transparent 72%),
    radial-gradient(360px 190px at 91% 87%, rgba(var(--glow), calc(var(--power) * .62)) 0%, transparent 72%),
    var(--space) !important;
  background-attachment: fixed;
  background-size: cover;
  background-repeat: no-repeat;
}
@media (prefers-color-scheme: dark) {
  .cc360-hero-nebula-bg {
    --space: #0b0b0d;
    --power: .30;
    --vignette: rgba(0, 0, 0, .65);
  }
}
.cc360-hero-nebula-bg [class*="row"],
.cc360-hero-nebula-bg [class*="container"],
.cc360-hero-nebula-bg [class*="column"] {

}

.cc360-hero-nav {

.cc360-hero-prev {

}
.cc360-hero-next {

<!-- 3 ▸ JS Data & Rendering -->
<script>
  'use strict';
  (function() {
    const data = {
      testimonials: [
        {
          name: 'Sarah Johnson',
          title: 'Fitness Coach',
          avatar: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop',
          date: '2024-05-18',
          stars: 5,
          reviewTitle: "Transformed my business!",
          reviewText: "Course Creator 360 helped me launch my fitness course in just two weeks. The templates are amazing and the support is top-notch. I made my first $10k in the first month!"
        },
        {
          name: 'Michael Chen',
          title: 'Business Consultant',
          initials: 'MC',
          date: '2024-05-15',
          stars: 5,
          reviewTitle: "All-in-one is an understatement",
          reviewText: "I was using 5 different tools before switching to CC360. Now everything is in one place, from my website to my email marketing. It's a game-changer for my productivity."
        },
        {
          name: 'Emily Rodriguez',
          title: 'Language Teacher',
          avatar: 'https://images.unsplash.com/photo-1521119989659-a83eee488004?w=80&h=80&fit=crop',
          date: '2024-05-12',
          stars: 5,
          reviewTitle: "So easy to use!",
          reviewText: "I'm not a tech-savvy person, but CC360 made it so simple to create and sell my language courses. The community feature is also fantastic for engaging with my students."
        },
        {
          name: 'David Lee',
          title: 'Marketing Expert',
          initials: 'DL',
          date: '2024-05-10',
          stars: 4,
          reviewTitle: "Great value for the price",
          reviewText: "The number of features you get for the price is unbeatable. The funnel builder is powerful and has helped me double my conversion rates. A few more integrations would make it perfect."
        },
        {
          name: 'Jessica Williams',
          title: 'Art Instructor',
          avatar: 'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=80&h=80&fit=crop',
          date: '2024-05-08',
          stars: 5,
          reviewTitle: "Incredible support team",
          reviewText: "I had an issue with setting up my custom domain, and the support team responded within minutes and solved it for me. They are always so friendly and helpful."
        }
      ]
    };

    /* Helper to create star icons */
    function getStars(n=5) {
      let str = '';
      for(let i=0; i<n; i++) {
        str += `<svg viewBox="0 0 20 20"><path d="M10 1l3.09 6.26L20 7.27l-5 4.87 1.18 6.88L10 15.34l-6.18 3.68L5 12.14l-5-4.87 6.91-1.01L10 1z"/></svg>`;
      }
      return str;
    }

    /* Render a single testimonial card */
    function renderCard(item) {
      const card = document.createElement('article');
      card.className = 'cc360-hero-card';

      const avatar = item.avatar
        ? `<img class="cc360-hero-avatar" src="${item.avatar}" alt="${item.name}" loading="lazy" width="44" height="44">`
        : `<div class="cc360-hero-init" aria-hidden="true">${item.initials}</div>`;

      card.innerHTML = `
        <div class="cc360-hero-head">
          ${avatar}
          <div>
            <div class="cc360-hero-name">${item.name}</div>
            <div class="cc360-hero-stars">${getStars(item.stars)}</div>
          </div>
        </div>
        <h3 class="cc360-hero-title">${item.reviewTitle}</h3>
        <p class="cc360-hero-text">${item.reviewText}</p>
        <button class="cc360-hero-toggle" aria-expanded="false" type="button">Read more</button>
      `;

      // Read more toggle
      const text = card.querySelector('.cc360-hero-text');
      const toggle = card.querySelector('.cc360-hero-toggle');
      // check if text is overflowing
      if (text.scrollHeight > text.clientHeight) {
        toggle.style.display = 'block';
      } else {
        toggle.style.display = 'none';
      }
      toggle.addEventListener('click', () => {
        const isExpanded = text.classList.toggle('open');
        toggle.textContent = isExpanded ? 'Read less' : 'Read more';
        toggle.setAttribute('aria-expanded', isExpanded);
      });

      return card;
    }

    /* Render all cards to track */
    const track = document.getElementById('cc360-hero-track');
    if (track) {
      data.testimonials.forEach(item => track.append(renderCard(item)));

      /* Average rating & total reviews */
      const totalReviews = data.testimonials.length;
      const avgRating = (data.testimonials.reduce((sum, t) => sum + t.stars, 0) / totalReviews).toFixed(2);
      document.getElementById('cc360-hero-avg').textContent = avgRating;
      document.getElementById('cc360-hero-total').textContent = `${totalReviews} reviews`;

      /* Carousel behavior */
      const carousel = document.querySelector('.cc360-hero-carousel');
      const prevBtn = carousel.querySelector('.cc360-hero-prev');
      const nextBtn = carousel.querySelector('.cc360-hero-next');
      let currentIndex = 0;

      function updateCarousel() {
        if (!track.children.length) return;
        const cardWidth = track.children[0].offsetWidth;
        const gap = parseInt(getComputedStyle(track).gap);
        const offset = -currentIndex * (cardWidth + gap);
        track.style.transform = `translateX(${offset}px)`;
      }

      nextBtn.addEventListener('click', () => {
        const visibleCards = Math.floor(carousel.offsetWidth / (track.children[0].offsetWidth + parseInt(getComputedStyle(track).gap)));
        if (currentIndex < track.children.length - visibleCards) {
          currentIndex++;
          updateCarousel();
        }
      });

      prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
          currentIndex--;
          updateCarousel();
        }
      });

      window.addEventListener('resize', updateCarousel);

      // Initial position
      updateCarousel();
    }
  })();
</script>
